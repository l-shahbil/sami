<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../images/logo.png" type="image/x-icon" />  <title>SAMI Random Number</title>
  <style>
    :root {
      --primary:   #0f4c5c;
      --secondary: #67c23a;
      --text:      #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(0.5rem, 3vw, 1.25rem);
      overflow: hidden;
      background: linear-gradient(135deg, #f4f7f8 0%, #e9f7ec 100%);
    }

    .glow {
      position: fixed;
      width: 40vmax; height: 40vmax;
      top: -10vmax; right: -10vmax;
      background: radial-gradient(circle, rgba(103,194,58,0.18), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(100%, 90vw, 26rem);
      padding: clamp(1.25rem, 5vw, 2.5rem) clamp(1rem, 4vw, 2rem);
      border-radius: clamp(1rem, 4vw, 1.75rem);
      text-align: center;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: 0 8px 30px rgba(15,76,92,0.12);
    }

    .logo {
      display: block;
      width: clamp(6rem, 28vw, 10rem);
      height: auto;
      object-fit: contain;
      margin: 0 auto clamp(1rem, 4vw, 1.75rem);
    }

    .title {
      color: var(--primary);
      font-size: clamp(0.9rem, 3.5vw, 1.2rem);
      font-weight: 600;
      margin-bottom: clamp(0.5rem, 2vw, 0.85rem);
    }

    .number {
      color: var(--secondary);
      font-size: clamp(3.5rem, 18vw, 7rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: clamp(0.75rem, 3vw, 1.2rem);
      text-shadow: 0 4px 12px rgba(103,194,58,0.22);
    }

    /* حالة التحميل */
    .number.loading {
      color: #ccc;
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 400;
    }

    .description {
      color: var(--text);
      font-size: clamp(0.8rem, 3vw, 1rem);
      line-height: 1.7;
    }

    .line {
      width: clamp(3rem, 12vw, 4.5rem);
      height: 0.2rem;
      margin: clamp(1rem, 4vw, 1.75rem) auto 0;
      border-radius: 999px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
    }

    /* رسالة خطأ */
    .error {
      color: #e53e3e;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
